<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Club Premium Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#pricing">Pricing</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="features">
            <h2>Features</h2>
            <div class="features-grid">
                <div class="feature-item">Feature 1</div>
                <div class="feature-item">Feature 2</div>
                <div class="feature-item">Feature 3</div>
            </div>
        </section>
        <section id="content-preview">
            <h2>Content Preview</h2>
            <p>Here is a sneak peek of what our premium content offers...</p>
        </section>
        <section id="pricing">
            <h2>Pricing Tiers</h2>
            <div class="pricing-tier">
                <h3>Basic Plan</h3>
                <p>$10/month</p>
            </div>
            <div class="pricing-tier">
                <h3>Premium Plan</h3>
                <p>$20/month</p>
            </div>
        </section>
        <section id="authentication">
            <h2>Login</h2>
            <form>
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 Exclusive Club. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
